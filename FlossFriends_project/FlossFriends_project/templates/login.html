<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Вход - FlossFriends</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/auth.css' %}">
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="auth-page">
            <form class="auth-form" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <label>Логин</label>
                <input type="text" name="username" placeholder="Логин" required>
    
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Пароль" required>
    
                <button type="submit">Войти</button>
                <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
    
                {% if error %}
                    <p style="color:red">{{ error }}</p>
                {% endif %}
            </form>
        </div>
    </body>
</html>
