{% extends 'base.html' %}
{% load static %}

{% block title %}Мой профиль - FlossFriends{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/my_profile.css' %}">
{% endblock %}

{% block content %}
<div class="page-content">
    <div class="profile-container">
        <div class="profile-info">
            <div class="avatar-section">
                <div class="avatar">
                    <img src="{% static 'images/avatar.png' %}" alt="Аватар" class="avatar-img">
                    <div class="avatar-overlay">
                        <span>✎</span>
                    </div>
                </div>
            </div>
            
            <div class="user-info-card">
                <span class="info-label">Имя пользователя</span>
                <div class="info-item">
                    <span class="info-value">Василиса</span>
                    <button class="edit-btn">
                        <img src="{% static 'images/edit.png' %}" alt="Редактировать" class="edit-icon">
                    </button>
                </div>
                <span class="info-label">Электронная почта</span>
                <div class="info-item">
                    <span class="info-value">jhhh@mail.ru</span>
                    <button class="edit-btn">
                        <img src="{% static 'images/edit.png' %}" alt="Редактировать" class="edit-icon">
                    </button>
                </div>
                <span class="info-label">Пароль</span>
                 <div class="info-item">
                    <input class="password-value" id="info-password"   type="password" placeholder="Введите новый пароль">
                    <button class="edit-btn">
                        <img src="{% static 'images/edit.png' %}" alt="Редактировать" class="edit-icon">
                    </button>
                </div>
            </div>
        </div>

        <div class="profile-actions">
            <button class="btn btn-logout">Выйти</button>
            <button class="btn btn-delete">Удалить профиль</button>
        </div>
    </div>
</div>
{% endblock %}
