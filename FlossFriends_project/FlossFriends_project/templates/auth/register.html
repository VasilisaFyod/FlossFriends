<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Регистрация - FlossFriends</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/auth.css' %}">
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="auth-page">
            <form method="POST" class="auth-form" action="{% url 'register' %}">
                {% csrf_token %}
                <label>Логин</label>
                <input type="text" name="username" placeholder="Логин">
                <label>Email</label>
                <input type="email" name="email" placeholder="Email">
                <label>Пароль</label>
                <div class="password-field">
                    <input id="register-password" type="password" name="password" placeholder="Пароль">
                    <button
                        type="button"
                        class="password-toggle"
                        data-target="register-password"
                        data-show-icon="{% static 'images/eye.svg' %}"
                        data-hide-icon="{% static 'images/close-eye.svg' %}"
                        aria-label="Показать пароль"
                    >
                        <img src="{% static 'images/eye.svg' %}" alt="" aria-hidden="true">
                    </button>
                </div>
                
                <button type="submit">Зарегистрироваться</button>
                <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
                
                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}
            </form>
        </div>
        <script src="{% static 'js/password_toggle.js' %}"></script>
    </body>
</html>
