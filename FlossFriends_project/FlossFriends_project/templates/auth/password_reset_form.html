<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Восстановление пароля - FlossFriends</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/auth.css' %}">
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="auth-page">
            <form class="auth-form" method="POST">
                {% csrf_token %}
                <h2>Восстановление пароля</h2>
                <p>Введите email, и мы отправим ссылку для сброса пароля.</p>

                <label for="{{ form.email.id_for_label }}">Email</label>
                {{ form.email }}

                <button type="submit">Отправить ссылку</button>
                <p><a href="{% url 'login' %}">Назад ко входу</a></p>

                {% if form.email.errors %}
                    <div class="error">{{ form.email.errors|striptags }}</div>
                {% endif %}
            </form>
        </div>
    </body>
</html>
