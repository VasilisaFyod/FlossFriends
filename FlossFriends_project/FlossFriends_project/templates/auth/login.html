<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Вход - FlossFriends</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/auth.css' %}">
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="auth-page">
            <form class="auth-form" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <label>Логин</label>
                <input type="text" name="username" placeholder="Логин" required>

                <label>Пароль</label>
                <div class="password-field">
                    <input id="login-password" type="password" name="password" placeholder="Пароль" required>
                    <button
                        type="button"
                        class="password-toggle"
                        data-target="login-password"
                        data-show-icon="{% static 'images/close-eye.svg' %}"
                        data-hide-icon="{% static 'images/eye.svg' %}"
                        aria-label="Показать пароль"
                    >
                        <img src="{% static 'images/close-eye.svg' %}" alt="" aria-hidden="true">
                    </button>
                </div>
                <p><a href="{% url 'password_reset' %}">Забыли пароль?</a></p>

                <button type="submit">Войти</button>
                <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>

                {% if error %}
                    <p style="color:red">{{ error }}</p>
                {% endif %}
            </form>
        </div>
        <script src="{% static 'js/password_toggle.js' %}"></script>
    </body>
</html>
