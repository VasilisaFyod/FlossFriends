{% extends 'base.html' %}
{% load static %}

{% block title %}Создание схемы - FlossFriends{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/create_pattern_steps.css' %}">
{% endblock %}

{% block content %}
<div class="page-content">
    <div class="pattern-steps-container">
        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-step active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-label">Размеры</div>
                </div>
                <div class="progress-step" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-label">Цвета</div>
                </div>
                <div class="progress-step" data-step="3">
                    <div class="step-number">3</div>
                    <div class="step-label">Легенда</div>
                </div>
            </div>
        </div>

        <div class="pattern-main-content">
            <div class="pattern-section">
                <div class="pattern-container">
                    <div class="pattern-wrapper">
                        <img id="sourceImage" src="{{ image_url }}" style="display:none;">
                        <canvas id="patternCanvas"></canvas>
                        <div class="pattern-overlay" id="patternOverlay"></div>
                    </div>
                </div>
            </div>

            <div class="steps-section">
                <div class="step-content" id="step1">
                    <div class="dimensions-card">
                        <div class="colors-slider-group">
                            <label  class="slider-label">Pазмеры схемы:</label>
                            <input type="range" class="colors-slider" id="sizeSlider" 
                                max="100" min="1" step="1">
                        </div>
                        
                        <div class="stats-preview">
                            <div class="stat-preview">
                                <span class="stat-value" id="previewCrosses"></span>
                                <span class="stat-label">Общее количество крестиков</span>
                            </div>
                        </div>
                    </div>
                </div>


                <div class="step-content" id="step2">
                    <div class="colors-card">
                        <div class="colors-slider-group">
                            <label class="slider-label">
                                Количество цветов: 
                                <span class="slider-value" id="colorsValue"></span>
                            </label>
                            <input type="range" class="colors-slider" id="colorsSlider" 
                                   min="1" max="50" step="2">
                        </div>

                        <div class="palette-group">
                            <label class="palette-label">Палитра ниток</label>
                            <select class="palette-select" id="paletteSelect">
                                <option value="dmc">DMC</option>
                                <option value="anchor">Гамма</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="step-content" id="step3">
                    <div class="legend-card">
                        <div class="calculation-settings">
                            <label class="calculation-label">Расчет длины в:</label>
                            <select class="calculation-select" id="calculationSelect">
                                <option value="meters">метрах</option>
                                <option value="skeins">мотках</option>
                            </select>
                        </div>

                        <div class="legend-table-container">
                            <table class="legend-table">
                                <thead>
                                    <tr>
                                        <th>Символ</th>
                                        <th>Код нитки</th>
                                        <th>Длина нитки</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody id="legendTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="navigation-buttons">
            <button class="create-btn" id="prevBtn" style="background: rgba(204, 134, 94, 0.96)">
                Назад
            </button>
            <button class="create-btn" id="nextBtn">
                Далее
            </button>
            <button class="create-btn" id="finishBtn">
                Готово
            </button>
        </div>
    </div>
</div>

<script src="{% static 'js/create_pattern_steps.js' %}"></script>
{% endblock %}
