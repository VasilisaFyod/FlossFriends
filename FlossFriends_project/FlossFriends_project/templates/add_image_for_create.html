{% extends 'base.html' %}
{% load static %}

{% block title %}Создать схему - FlossFriends{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_image_for_create.css' %}">
{% endblock %}

{% block content %}
<div class="page-content">

    <div class="create-pattern-container">

        <div class="tabs">
            <button class="tab-button active" data-tab="generate">Генерация</button>
            <button class="tab-button" data-tab="upload">Загрузка</button>
        </div>

        <div class="tab-content active" id="generate-tab">

            <div class="ai-chat-section">

                <p class="section-description">
                    Опишите изображение, которое хотите сгенерировать
                </p>

                <div class="prompt-input-container">
                    <textarea 
                        class="prompt-input" 
                        id="promptInput"
                        placeholder="Опишите изображение..."
                        rows="3"
                    ></textarea>

                    <button class="create-btn" id="generateAiBtn">
                        Сгенерировать
                    </button>
                </div>

                <div class="ai-result-container" id="aiResultContainer">

                    <div class="ai-generated-image">
                        <img src="{% static 'images/pattern.jpg' %}" id="aiGeneratedImage">

                        <div class="image-actions">
                            <button class="create-btn" id="useAiImageBtn">
                                Использовать
                            </button>

                            <button class="create-btn" id="regenerateBtn">
                                Сгенерировать заново
                            </button>
                        </div>
                    </div>

                </div>

            </div>

        </div>

        <!-- Загрузка -->
        <div class="tab-content" id="upload-tab">

            <div class="upload-section">

                <p class="section-description">
                    Загрузите изображение
                </p>

                <form method="post" enctype="multipart/form-data" id="uploadForm">
                    {% csrf_token %}
                    <input type="file" name="image" id="imageUpload" accept="image/*" hidden>
                </form>

                <div class="upload-area" id="uploadArea">

                    <p class="upload-title">Перетащите изображение</p>

                    <p class="divider-text">или</p>

                    <button type="button" class="create-btn" id="uploadBtn">
                        Выберите файл
                    </button>

                </div>

            </div>

        </div>

        <div class="action-buttons">
           <a href="/create_pattern_steps/">
                <button class="create-btn">
                    Создать схему
                </button>
            </a>
        </div>

    </div>

</div>

<script src="{% static 'js/add_image_for_create.js' %}"></script>

{% endblock %}
