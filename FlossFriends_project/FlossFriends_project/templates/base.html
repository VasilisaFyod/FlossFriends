<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlossFriends{% endblock %}</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'images/ai.png' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle">
        ☰
    </button>

    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" id="sidebarClose">×</button>
        <nav class="sidebar-nav">
            <a href="/my_profile/" class="nav-link">Мой профиль</a>
            <a href="/my_patterns/" class="nav-link">Cхемы</a>
            <a href="{% url 'favorites' %}" class="nav-link">Избранное</a>
            <a href="/inventory/" class="nav-link">Инвентарь</a>
            <a href="{% url 'community' %}" class="nav-link">Публикации</a>
            
            <form class="nav-link" style="padding: 10px 0px; background: #D65C6A; margin: 30px 0px 0px 0px;" method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
                <button class="btn-exit" >Выйти</button>
            </form>

        </nav>
    </aside>

    <div class="main-content" id="mainContent">
        
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>
    
    <div class="confirm-modal-overlay" id="confirmModal">
        <div class="confirm-modal">
            <p id="confirmMessage">Вы уверены?</p>
            <div class="confirm-buttons">
                <button type="button" id="confirmYes">Да</button>
                <button type="button" id="confirmNo">Отмена</button>
            </div>
        </div>
    </div>
    <script src="{% static 'js/base.js' %}"></script>

</body>
</html>
