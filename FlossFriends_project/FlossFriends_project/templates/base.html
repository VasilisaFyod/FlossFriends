<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlossFriends{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle">
        ☰
    </button>

    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" id="sidebarClose">×</button>
        <nav class="sidebar-nav">
            <a href="/my_profile/" class="nav-link">Мой профиль</a>
            <a href="/my_patterns/" class="nav-link">Мои схемы</a>
            <a href="/favorites/" class="nav-link">Избранное</a>
            <a href="/inventory/" class="nav-link">Инвентарь</a>
            <a href="/community/" class="nav-link">Сообщество</a>
            <a href="//" class="nav-link" style="color: red; padding: 20px 0px;">Выйти</a>
        </nav>
    </aside>

    <div class="main-content" id="mainContent">

        <main>
            {% block content %}
            <!--контент из дочерних шаблонов -->
            {% endblock %}
        </main>
    </div>

    <script src="{% static 'js/base.js' %}"></script>
</body>
</html>
